name: Docker Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  docker-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build container
        run: docker build -t obsidian-telegram:ci .
