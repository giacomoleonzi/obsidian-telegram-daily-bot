

services:
  obsidian-telegram:
    build:
      context: .
    image: obsidian-telegram:latest
    container_name: obsidian-telegram
    restart: unless-stopped
    env_file:
      - ./config/.env
    volumes:
      - ./vault:/vault
    healthcheck:
      test: ["CMD", "pgrep", "-f", "bot.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

